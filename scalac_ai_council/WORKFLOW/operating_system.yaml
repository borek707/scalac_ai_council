# RADA AI - Operating System
# System operacyjny Rady Marketingowych AI Doradców dla Scalac

meeting_rhythm:
  monday_async:
    name: "Weekly Brief"
    format: "Notion/Slack update"
    time: "Every Monday, 9:00 AM"
    duration: "15 min (async)"
    content:
      - "Co zrobiliśmy w zeszłym tygodniu (data)"
      - "CORE vs AI split: ile czasu na który obszar"
      - "Blockers (co blokuje)"
      - "Needs from others (czego potrzebuję od innych agentów)"
    books_ref: 
      - "Predictable Revenue (metrics visibility)"
      - "Hard Things (discipline)"
    
  wednesday_sync:
    name: "Creative Sprint"
    format: "30 min video call"
    time: "Every Wednesday, 2:00 PM"
    duration: "30 min"
    structure:
      - "Problem: nowa oferta CORE lub AI, lub jak połączyć oba"
      - "2 agenty prezentują (5 min each)"
      - "3 pomagają rozwiązać (20 min)"
    rotation: "Offer↔Funnel, Words↔Content, Leads↔Offer"
    books_ref:
      - "Hacking Growth (cross-functional collaboration)"
      - "Challenger Sale (constructive tension)"
    
  friday_demo:
    name: "Ship It"
    format: "Demo gotowych assetów"
    time: "Every Friday, 4:00 PM"
    duration: "30 min"
    rules:
      - "Tylko finished work, no WIP"
      - "Każdy asset musi mieć oznaczenie CORE lub AI (lub oba)"
      - "Feedback: 'What I liked / What would make it 10x better'"
    books_ref:
      - "Hard Things (iterate fast)"
      - "Zero to One (secrets)"

core_ai_integration:
  rule: "Każdy projekt AI sprawdź czy nie ma pod spodem CORE problemu"
  checklist:
    - "Czy klient ma working infrastructure? (K8s, GPU, security)"
    - "Czy AI to 'nice to have' czy 'compliance blocker'?"
    - "Czy AI wymaga CORE infrastructure?"
  examples:
    - scenario: "Klient chce Sovereign AI"
      check: "Czy mają infrastructure do hostowania?"
      if_no: "To też CORE projekt (K8s, security)"
      if_yes: "To czysty AI projekt"
    - scenario: "Klient chce Team Extension"
      check: "Czy potrzebują AI skills?"
      if_yes: "Upsell do AI-capable team"
      if_no: "Czysty CORE projekt"
  books_ref: "Zero to One (secrets - łączenie CORE + AI to nasz secret)"

decision_making:
  model: "Rada doradcza, nie demokracja"
  tie_breaker: "Head of Growth (użytkownik)"
  escalation: "Gdy 2 agenty się nie zgadzają → test A/B lub decyzja biznesowa"
  priority_rules:
    1. "CORE revenue > AI revenue (80/20 rule)"
    2. "Ale AI margin > CORE margin (priorytetyzuj jeśli pay)"
    3. "AI które wymaga CORE > AI standalone (leverage)"
  books_ref:
    - "Hard Things (hard decisions)"
    - "Zero to One (secrets > consensus)"

conflict_resolution:
  method: "Constructive tension (Challenger Sale)"
  process:
    1. "Each agent states their position with data from their books"
    2. "Others ask clarifying questions (Mom Test style)"
    3. "Look for 'both/and' (np. 'Team extension WITH AI skills')"
    4. "If still conflict → Head of Growth decides based on 80/20"
  books_ref:
    - "Challenger Sale (tension)"
    - "Thinking Fast and Slow (bias awareness)"

metrics_review:
  monthly:
    - name: "Total Pipeline"
      target: "500k PLN"
      description: "Łączny pipeline (CORE + AI)"
    - name: "CORE Pipeline"
      target: "400k PLN (80%)"
      description: "Pipeline z CORE usług"
    - name: "AI Pipeline"
      target: "100k PLN (20%)"
      description: "Pipeline z AI usług"
    - name: "CAC by Service Type"
      target: "Track and optimize"
      description: "Cost per acquisition dla team ext vs project vs AI"
    - name: "Win Rate by Service Type"
      target: ">30%"
      description: "Konwersja opportunity → closed"
    - name: "Velocity"
      target: "Shorter for CORE, longer for AI"
      description: "Dni od lead do closed"
  books_ref:
    - "Predictable Revenue (metrics)"
    - "Data-Driven Marketing (dashboards)"

culture_values:
  - name: "Engineering Excellence + Commercial Focus"
    book: "Hard Things"
    description: "Jesteśmy engineerami którzy rozumieją business"
  - name: "Pigheaded Discipline"
    book: "Ultimate Sales Machine"
    description: "Systematyczne działanie, nie random"
  - name: "Secrets > Best Practices"
    book: "Zero to One"
    description: "Szukamy tego czego inni nie widzą"
  - name: "Teach, Don't Sell"
    book: "Challenger Sale"
    description: "Edukujemy klientów, nie wciskamy"
  - name: "System 1 + System 2 Thinking"
    book: "Thinking Fast and Slow"
    description: "Emocje + logika razem"
  - name: "80/20 CORE/AI Balance"
    description: "Real business, nie hype"

agent_balances:
  marcus_vs_elena:
    marcus: "Agresywne timelines, nowe oferty"
    elena: "Realistyczne velocity, data-driven"
    balance: "Marcus push, Elena validate"
  
  kai_vs_sofia:
    kai: "Quality, perfectionism"
    sofia: "Speed, deadlines, volume"
    balance: "Kai creates, Sofia ships"
  
  elena_vs_david:
    elena: "Process, analysis"
    david: "Action, execution"
    balance: "Elena plans, David executes"
  
  all_vs_marcus:
    marcus: "New shiny offers"
    others: "Capacity, focus"
    balance: "Marcus innovates, others operationalize"

quarterly_review:
  name: "QBR - Quarterly Business Review"
  frequency: "Every quarter"
  agenda:
    - "Revenue split: czy 80/20 jest accurate?"
    - "Margin analysis: czy AI ma higher margin?"
    - "Leverage: czy CORE+AI bundles działają?"
    - "Market: czy AI adoption wzrósł (czyli może 70/30)?"
    - "Decision: adjust split na następny kwartał"
  output: "Updated CORE/AI split for next quarter"
