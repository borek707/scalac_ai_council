# RADA AI - Project Workflows
# Workflow dla 4 typów projektów: CORE team ext, CORE project, AI sovereign, AI+CORE bundle

project_types:
  core_team_extension:
    name: "Team Extension (CORE - 80%)"
    description: "Dostarczanie Scala devów embedded w kliencie"
    
    workflow:
      - phase: "Discovery"
        owner: "Marcus + David"
        duration: "1-2 tygodnie"
        activities:
          - "Mom Test: 'Jak ostatnio skalowaliście team?'"
          - "Tech stack assessment: Scala? Akka? Kafka?"
          - "Team size: 1 dev czy 10 devs?"
          - "Timeline: yesterday czy Q3?"
        output: "Team Extension Proposal (Good/Better/Best)"
        books: 
          - "Mom Test"
          - "Monetizing Innovation"
          - "Crossing the Chasm"
      
      - phase: "Design"
        owner: "Marcus + Elena"
        duration: "1 tydzień"
        activities:
          - "Pricing: T&M vs retainer vs outcome-based"
          - "Onboarding plan: 2 weeks standard"
          - "Knowledge transfer: 3-month overlap"
          - "SLA: response time, replacement guarantee"
        output: "Contract + SOW"
        books:
          - "Monetizing Innovation"
          - "Impossible to Inevitable"
      
      - phase: "GTM"
        owner: "David + Elena"
        duration: "Ongoing"
        activities:
          - "ABM: target accounts hiring Scala devs"
          - "Content: 'How to onboard remote devs in 2 weeks'"
          - "Outbound: 'Widzieliśmy że zatrudniacie...'"
        output: "Live campaign"
        books:
          - "ABM Playbook"
          - "Predictable Revenue"
          - "LinkedIn Strategy"
      
      - phase: "Delivery"
        owner: "Elena (handoff to ops)"
        duration: "Project duration"
        activities:
          - "Weekly check-ins"
          - "Monthly business reviews"
          - "Expansion: more devs, more teams"
        output: "Happy client + case study"
        books:
          - "Demand-Side Sales"
    
    metrics:
      - "Time to first dev: 2 weeks"
      - "Client satisfaction: >4.5/5"
      - "Expansion rate: >30%"

  core_project:
    name: "Project-Based (CORE - migration, architecture)"
    description: "Fixed-scope projects: migracje, architecture review"
    
    workflow:
      - phase: "Discovery"
        owner: "Marcus"
        duration: "2 tygodnie"
        activities:
          - "Architecture Review: audyt systemu"
          - "Scope definition: co robimy, czego nie robimy"
          - "Risk assessment: co może pójść nie tak"
        output: "Architecture Review Report"
        
      - phase: "Proposal"
        owner: "Marcus + Elena"
        duration: "1 tydzień"
        activities:
          - "Fixed price vs T&M decision"
          - "Outcome-based pricing (jeśli applicable)"
          - "Milestones definition"
        output: "Proposal + Contract"
        
      - phase: "Delivery"
        owner: "Elena (handoff to delivery team)"
        duration: "3-12 miesięcy"
        activities:
          - "Weekly demos"
          - "Milestone reviews"
          - "Scope management"
        output: "Delivered system + documentation"
        
      - phase: "Handoff"
        owner: "Elena"
        duration: "1 miesiąc"
        activities:
          - "Knowledge transfer"
          - "Documentation"
          - "Training"
        output: "Client self-sufficient + case study"

  ai_sovereign:
    name: "Sovereign AI Project (AI - 20%)"
    description: "Sovereign AI dla regulated industries"
    
    workflow:
      - phase: "Discovery"
        owner: "Marcus + David"
        duration: "2-3 tygodnie"
        activities:
          - "Mom Test: 'Jak ostatnio próbowaliście AI compliance?'"
          - "Assessment: czy mają infrastructure (CORE)?"
          - "Beachhead: banki z existing AI POC"
          - "Whole Product: infra + model + compliance + monitoring"
        output: "AI Architecture Assessment Proposal"
        books:
          - "Mom Test"
          - "Crossing the Chasm"
          - "StoryBrand"
      
      - phase: "Assessment"
        owner: "Marcus (tech) + Kai (communication)"
        duration: "2 tygodnie"
        activities:
          - "Architecture Review: current AI setup"
          - "Compliance gap analysis"
          - "Infrastructure requirements (K8s, GPU, security)"
          - "BrandScript: 'Compliance-ready AI'"
        output: "Assessment Report + Roadmap"
        books:
          - "StoryBrand"
          - "Challenger Sale"
          - "Obviously Awesome"
      
      - phase: "POC"
        owner: "Marcus + Elena"
        duration: "3 miesiące"
        activities:
          - "Good-Better-Best: Assessment only / POC / Production"
          - "3-month POC scope"
          - "Compliance checkpoint"
        output: "POC Contract"
        books:
          - "Monetizing Innovation"
          - "MEDDIC"
      
      - phase: "Production"
        owner: "Elena (handoff to delivery)"
        duration: "6+ miesięcy"
        activities:
          - "Full Sovereign AI deployment"
          - "LLMOps setup"
          - "Ongoing compliance monitoring"
        output: "Production system + case study"
        books:
          - "Impossible to Inevitable"
          - "Hard Things"
    
    metrics:
      - "Assessment → POC conversion: >40%"
      - "POC → Production conversion: >60%"
      - "Compliance audit pass rate: 100%"

  ai_team_extension:
    name: "AI-Capable Team Extension (CORE + AI - leverage)"
    description: "Team extension z AI skills - nasz secret sauce"
    
    workflow:
      - phase: "Discovery"
        owner: "Marcus + David"
        duration: "1-2 tygodnie"
        activities:
          - "Core need: team extension"
          - "AI opportunity: 'Czy potrzebujecie też AI skills?'"
          - "Upsell: 'Możemy dać devs którzy znają i Scalę i AI'"
        output: "Team Extension with AI capabilities"
        books:
          - "Zero to One (secret: łączenie CORE + AI)"
      
      - phase: "Team Composition"
        owner: "Marcus"
        duration: "1 tydzień"
        activities:
          - "80/20 split: 80% Scala, 20% AI skills"
          - "Identify AI-capable devs w Scalac"
          - "Define AI scope: RAG, LLM integration, etc."
        output: "Team proposal"
        
      - phase: "Delivery"
        owner: "Elena"
        duration: "Ongoing"
        activities:
          - "Regular team extension delivery"
          - "AI capabilities demo"
          - "Expansion to full AI projects"
        output: "Happy client + AI upsell"
    
    key_insight: "To jest nasz najważniejszy typ projektu - higher margin, higher stickiness, competitive moat"

handoffs:
  format: "Structured brief z kontekstem CORE vs AI"
  
  template: |
    FROM: [Agent]
    TO: [Agent]
    PROJECT: [Nazwa]
    TYPE: [CORE / AI / CORE+AI]
    
    CONTEXT:
    - Core problem: [system scaling, team shortage, legacy]
    - AI component: [tak/nie, jeśli tak to jakie]
    - Klient priority: [speed vs cost vs compliance]
    
    DELIVERABLES: [Linki]
    
    OPEN QUESTIONS:
    - [Czy to na pewno AI czy CORE problem?]
    - [Czy klient wie że AI wymaga CORE infrastructure?]
    
    NEXT STEPS: [Co ma zrobić odbiorca]
    
    BOOKS_REF: [Które koncepty z książek są relevantne]

books_integration:
  rule: "Każdy output MUSI zawierać reference do konkretnej książki/frameworku"
  example: "Ta oferta używa Good-Better-Best z Monetizing Innovation i BrandScript z StoryBrand. To CORE projekt z AI component (łączenie per Zero to One)."
