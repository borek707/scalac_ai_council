# Kai - Tools & Frameworks

key_frameworks:
  - name: "Writing GPS"
    book: "Everybody Writes - Ann Handley"
    template: |
      Goal: [co chcemy osiągnąć]
      Why: [dlaczego to ważne]
      Who: [CTO/VP Eng/CISO]
      What: [co mówimy]
      So What: [dlaczego to dla nich ważne]
    example_core: |
      Goal: Pokazać że Scalac potrafi przejąć legacy system
      Why: Budujemy trust z CTO którzy boją się outsourcingu
      Who: CTO w fintechach z legacy Scala
      What: Jak przejęliśmy payroll od founding team
      So What: "Możesz spać spokojnie, my ogarniemy"
    example_ai: |
      Goal: Pokazać że Sovereign AI przechodzi compliance
      Why: Budujemy trust z CISO którzy boją się AI risk
      Who: CISO w bankach z AI POC
      What: Jak przeszliśmy audit bez findingów
      So What: "AI w produkcji bez obawy o karę"
    use_for:
      - "Every piece of content"
      - "Before writing anything"

  - name: "Big 5"
    book: "They Ask, You Answer - Marcus Sheridan"
    template: |
      1. Cost: [transparent pricing]
      2. Problems: [kiedy się nie sprawdza]
      3. Comparisons: [vs alternatives]
      4. Reviews: [testimonials]
      5. Best: [kiedy wybrać nas]
    core_variant: |
      Cost: "Team extension vs in-house: 30% cheaper, 3x faster"
      Problems: "Kiedy team extension się nie sprawdza: małe projekty, brak internal ownera"
      Comparisons: "Scalac vs nearshore: engineering DNA; vs Big4: embedded, nie advisory"
      Reviews: "Clutch 4.9, 89+ companies"
      Best: "Kiedy warto: scaling 5→25 devów, legacy modernization"
    ai_variant: |
      Cost: "Sovereign AI vs OpenAI: 2x cheaper przy skali, compliance included"
      Problems: "Dlaczego RAG projekty failują: brak infrastructure, no guardrails, no monitoring"
      Comparisons: "Scalac vs McKinsey: production-ready, nie tylko strategy; vs OpenAI: compliance"
      Reviews: "Audit passed, zero findings"
      Best: "Kiedy warto: regulated industries, compliance requirements, data sensitivity"
    use_for:
      - "Landing pages"
      - "FAQ pages"
      - "Sales collateral"

  - name: "AIDA"
    book: "The Copywriter's Handbook - Robert Bly"
    template: |
      Attention: [hook - zatrzymaj czytelnika]
      Interest: [problem - zainteresuj]
      Desire: [solution + proof - spraw że chcą]
      Action: [CTA - powiedz co robić]
    example_core: |
      Attention: "Hiring senior Scala devs takes 6 months. We deliver in 2 weeks."
      Interest: "89+ companies scaled with Scalac developers. From fintech to healthtech."
      Desire: "Twój tech lead może skupić się na architekturze, nie na rekrutacji. Case study: Liga Digital scaled 10x."
      Action: "Zobacz dostępnych developerów"
    example_ai: |
      Attention: "80% AI pilots fail in production. Here's why."
      Interest: "RAG to nie tylko 'wrzuć PDF do OpenAI'. To distributed system z 12 komponentami."
      Desire: "Scalac buduje production-ready AI z monitoringiem i compliance. Case study: Swiss bank, audit passed."
      Action: "Download 'The RAG Mirage' whitepaper"
    use_for:
      - "Landing pages"
      - "Emails"
      - "Ads"

  - name: "4 U's"
    book: "The Copywriter's Handbook - Robert Bly"
    template: |
      Urgent: [dlaczego teraz]
      Unique: [czego nikt inny nie ma]
      Useful: [konkretna korzyść]
      Ultra-specific: [liczby, konkrety]
    examples:
      - "How Swiss Fintech Scaled 10x Without Hiring 40 People (Unique Playbook)" (CORE)
      - "The Urgent Guide to AI Act Compliance for EU Banks (6 Months to Deadline)" (AI)
      - "Reduce Kafka Latency by 70% in 30 Days (Case Study)" (CORE)
      - "Sovereign AI: Zero Data Leakage, Audit Passed (Swiss Bank Case)" (AI)
    use_for:
      - "Headlines"
      - "Email subject lines"
      - "Ad copy"

  - name: "Positioning Statement"
    book: "Obviously Awesome - April Dunford"
    template: |
      Dla [target customers]
      którzy [problem/need]
      [product name] to [category]
      które [key benefit]
      W przeciwieństwie do [alternatives]
      nasz produkt [unique differentiation]
    core_positioning: |
      Dla CTO fintechów którzy muszą skalować team 10x w 12 miesięcy,
      Scalac to technical team extension które daje senior Scala devs
      embedded w Waszym teamie w 2 tygodnie.
      W przeciwieństwie do nearshore lub Big4,
      mamy engineering DNA i 10 lat doświadczenia w distributed systems.
    ai_positioning: |
      Dla CISO banków którzy mają AI POC który nie przechodzi compliance,
      Scalac to Sovereign AI infrastructure które przechodzi audit
      bez findingów.
      W przeciwieństwie do McKinsey lub OpenAI,
      budujemy production-ready distributed systems z LLM w środku.
    use_for:
      - "Homepage hero"
      - "Pitch decks"
      - "Sales conversations"

  - name: "Simplicity Check"
    book: "On Writing Well - William Zinsser"
    rules:
      - "Usuń: innovative, cutting-edge, leverage, synergy, world-class"
      - "Zastąp konkretami: 50k msg/sec, latency <1ms, 89+ companies"
      - "Zacznij od akcji, nie od intro"
      - "Jedno zdanie = jedna myśl"
    examples:
      - before: "Scalac is an innovative software development company leveraging cutting-edge technologies..."
        after: "We put Scala developers in your team. They ship code in week 2."
      - before: "Scalac.ai provides innovative AI solutions for modern enterprises..."
        after: "Your AI stays in your cloud. No data leaves. Compliance happy."
    use_for:
      - "Final edit"
      - "Clarity check"

output_formats:
  - name: "Landing Page Copy"
    description: "Kompletna strona landingowa"
    sections:
      - "Headline (4 U's)"
      - "Subheadline"
      - "AIDA Body"
      - "Big 5 Section"
      - "Social Proof"
      - "CTA"
    
  - name: "Case Study"
    description: "Case study w formacie story"
    sections:
      - "Headline (Result + Company)"
      - "Lead (hook)"
      - "Challenge"
      - "Solution"
      - "Results (metryki)"
      - "Quote"
    
  - name: "Email Sequence"
    description: "5-email nurture sequence"
    emails:
      - "Email 1: Value (helpful content)"
      - "Email 2: Problem (agitate)"
      - "Email 3: Solution (introduce Scalac)"
      - "Email 4: Proof (case study)"
      - "Email 5: CTA (direct offer)"

checklists:
  - name: "Copy Review Checklist"
    items:
      - "Writing GPS wypełniony"
      - "Big 5 covered (jeśli landing page)"
      - "AIDA structure (jeśli sales copy)"
      - "4 U's w headline"
      - "Clutter usunięty (Zinsser)"
      - "Proof points dodane (metryki)"
      - "CTA jasne i konkretne"
      - "Tone: CORE czy AI?"

  - name: "Case Study Checklist"
    items:
      - "Headline: Result + Company + Timeframe"
      - "Lead zaczyna się od akcji"
      - "Challenge jest konkretny"
      - "Solution opisuje co zrobiliśmy"
      - "Results mają metryki (liczby)"
      - "Quote od klienta"
      - "Length: 500-800 słów"

triggers:
  - "Nowa landing page (od Marcusa)"
  - "Case study do napisania (od Eleny)"
  - "Email sequence (od Davida)"
  - "Ad copy (od Sofii)"
  - "Sales collateral (od Eleny)"

handoff_from:
  sender: "Marcus/Elena"
  format: |
    FROM: [Marcus/Elena]
    TO: Kai
    PROJECT: [Nazwa]
    TYPE: [CORE / AI]
    
    INPUT:
    - Value prop: [link]
    - Target: [CTO/VP Eng/CISO]
    - Key message: [co musi być w copy]
    - Proof points: [metryki, case studies]
    - Tone: [technical/business/aggressive]
    
    OUTPUT NEEDED:
    - [ ] Landing page copy
    - [ ] Email sequence (5 emails)
    - [ ] Ad copy (3 variants)
    
    DEADLINE: [data]
