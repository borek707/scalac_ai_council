# Marcus - Tools & Frameworks

key_frameworks:
  - name: "Beachhead Market Selection (Chasm)"
    book: "Crossing the Chasm - Geoffrey Moore"
    template: |
      Dla [produktu/usługi], beachhead market to:
      - Target: [konkretny segment, np. "Fintechy Series B w EU"]
      - Problem: [ból, np. "Potrzebują 20 devów w 3 miesiące"]
      - Competition: [alternatywy, np. "In-house hiring, nearshore, Big4"]
      - Access: [jak dotrzeć, np. "LinkedIn CTO, konferencje fintech"]
      - Whole Product: [co musimy dodać, np. "Devs + onboarding + KT"]
    use_for:
      - "Nowa oferta (CORE lub AI)"
      - "Wejście na nowy rynek"
      - "Prioritization segmentów"

  - name: "BrandScript (StoryBrand)"
    book: "Building a StoryBrand - Donald Miller"
    template: |
      Hero: [CTO/VP Eng/CISO]
      Problem: 
        - External: [co się dzieje]
        - Internal: [jak się czuje]
        - Philosophical: [dlaczego to niesprawiedliwe]
      Guide: [Scalac - empatia + autorytet]
      Plan: 
        1. [Krok 1: Assessment/Review]
        2. [Krok 2: Execution]
        3. [Krok 3: Handoff/Success]
      CTA: [Direct: "Zatrudnij nas" lub Transitional: "Zobacz case study"]
      Success: [Jak wygląda wygrana]
      Failure: [Co się stanie jak nie zrobią nic]
    use_for:
      - "Landing page copy"
      - "Pitch deck"
      - "Case study structure"
      - "Sales script"

  - name: "Good-Better-Best Pricing"
    book: "Monetizing Innovation - Madhavan Ramanujam"
    template: |
      Good ([price]): [core offering, entry point]
      Better ([price]): [Good + key additions, most popular]
      Best ([price]): [Better + premium services, enterprise]
      Decoy/Anchor: [coś droższego żeby Best wyglądało rozsądnie]
      WTP Evidence: [co powiedzieli w Mom Test interviews]
    variants:
      - name: "CORE Team Extension"
        good: "1 senior dev, T&M, 2-week onboarding, 85 EUR/h"
        better: "Team 3-5 devs, dedicated PM, monthly retainer, SLA, 80 EUR/h"
        best: "10+ devs, embedded team lead, full KT program, 75 EUR/h"
        decoy: "Big4 consulting at 200 EUR/h"
      - name: "CORE Project"
        good: "Fixed price MVP (scope locked), 50-100k EUR"
        better: "T&M with cap, flexible scope, 100-300k EUR"
        best: "Outcome-based (np. 'latency <10ms' = bonus), 300k+ EUR"
        decoy: "In-house hiring cost: 6 months × 150k EUR = 900k"
      - name: "AI Sovereign"
        good: "Architecture Review + roadmap, 5-15k EUR, 2-3 weeks"
        better: "POC Sovereign AI (3 months), 50-100k EUR"
        best: "Production system + LLMOps (6+ months), 200k+ EUR"
        decoy: "McKinsey AI assessment: 300k EUR"
    use_for:
      - "Pricing new offers"
      - "Negotiations"
      - "Upsell strategy"

  - name: "Challenger Pitch"
    book: "The Challenger Sale - Matthew Dixon"
    template: |
      Insight: "Większość [segmentu] myśli że [common belief],
      ale prawda jest taka że [new reality - technical truth].
      To oznacza [risk/opportunity - business impact].
      
      [Scalac] pomaga [specific solution].
      Robiliśmy to dla [proof - case study].
      
      [Next step - specific action]."
    core_example: |
      "Większość firm myśli że Kubernetes rozwiąże ich skalowanie,
      ale prawda jest taka że 80% wydajności leży w application layer.
      To oznacza że możecie wydać 500k na K8s i nadal mieć downtime.
      
      Scalac pomaga zoptymalizować application layer.
      Robiliśmy to dla Bexio - zmniejszyliśmy latency o 70%.
      
      Zaczynamy od Architecture Review w przyszłym tygodniu."
    ai_example: |
      "Większość firm myśli że RAG to 'wrzuć PDF do OpenAI',
      ale prawda jest taka że production RAG to distributed system z 12 komponentami.
      To oznacza że 80% AI pilots fail w produkcji.
      
      Scalac buduje production-ready RAG z monitoringiem i compliance.
      Robiliśmy to dla szwajcarskiego banku - przeszli audit bez problemu.
      
      Zaczynamy od AI Compliance Assessment."
    use_for:
      - "First sales call"
      - "Conference talks"
      - "LinkedIn thought leadership"

  - name: "WTP Research (Mom Test)"
    book: "The Mom Test - Rob Fitzpatrick"
    questions:
      - "Jak ostatnio próbowaliście rozwiązać [problem]?"
      - "Ile to Was kosztowało (czas/pieniądze/failures)?"
      - "Kto jeszcze w firmie o tym decyduje?"
      - "Co by się stało gdybyście nic nie zrobili?"
      - "Czy próbowaliście już [alternatywa]? Co poszło nie tak?"
    core_questions:
      - "Jak ostatnio skalowaliście team gdy potrzebowaliście 10 devów na już?"
      - "Ile to kosztowało gdy system był down przez 4 godziny?"
      - "Jak ostatnio próbowaliście zatrudnić senior Scala deva? Ile to trwało?"
      - "Co się stało jak ostatni projekt się opóźnił o 3 miesiące?"
    ai_questions:
      - "Jak ostatnio próbowaliście rozwiązać problem compliance w AI?"
      - "Ile kosztował Was ostatni projekt AI który został zablokowany przez legal?"
      - "Co się stało jak Wasz AI POC nie przeszedł security review?"
      - "Ile wydajecie miesięcznie na OpenAI API i jak to skaluje?"
    use_for:
      - "Customer discovery"
      - "Validating new offers"
      - "Pricing research"

  - name: "PQL Definition (PLG)"
    book: "Product-Led Growth - Wes Bush"
    template: |
      PQL dla [oferty]:
      - Action: [co musi zrobić]
      - Value experienced: [co zobaczy]
      - Conversion signal: [co oznacza że jest gotowy do kupna]
      - TTV: [jak szybko]
    core_pqls:
      - name: "Architecture Review"
        action: "Zarezerwować darmowy review"
        value: "Raport z 3 kluczowymi bottleneckami w ich systemie"
        signal: "Pytają o timeline i pricing"
        ttv: "5 dni roboczych"
      - name: "Trial Developer"
        action: "Onboard 1 dev na 2 tygodnie"
        value: "Shipped code, działający PR"
        signal: "Chcą więcej devów"
        ttv: "2 tygodnie"
    ai_pqls:
      - name: "AI Compliance Assessment"
        action: "Zapłacić 5k EUR za assessment"
        value: "Raport z lukami compliance + roadmap"
        signal: "Pytają o timeline POC"
        ttv: "2 tygodnie"
    use_for:
      - "Defining funnel stages"
      - "Measuring funnel effectiveness"
      - "Sales prioritization"

output_formats:
  - name: "Offer Package"
    description: "Kompletna oferta z value prop, pricing, positioning"
    sections:
      - "Type: CORE / AI / CORE+AI"
      - "Value Proposition (StoryBrand)"
      - "Beachhead Market (Chasm)"
      - "Pricing (Good-Better-Best)"
      - "Challenger Pitch"
      - "PQL Definition"
      - "Validation Questions"
    
  - name: "BrandScript"
    description: "StoryBrand framework wypełniony"
    sections:
      - "Hero"
      - "Problem (External/Internal/Philosophical)"
      - "Guide (Empathy + Authority)"
      - "Plan (3 kroki)"
      - "CTA"
      - "Success"
      - "Failure"
    
  - name: "Challenger Pitch Deck"
    description: "3-slajdowy pitch"
    slides:
      - "Slajd 1: Insight (Teach)"
      - "Slajd 2: Proof (Tailor)"
      - "Slajd 3: Next Step (Take Control)"

checklists:
  - name: "New Offer Checklist"
    items:
      - "Beachhead market zdefiniowany (Chasm)"
      - "BrandScript kompletny (StoryBrand)"
      - "Good-Better-Best pricing (Monetizing)"
      - "Challenger Pitch gotowy"
      - "PQL zdefiniowany (PLG)"
      - "Mom Test questions przygotowane"
      - "CORE/AI diagnosis: które to?"
      - "Handoff brief dla Eleny gotowy"

  - name: "CORE vs AI Diagnosis"
    items:
      - "Czy klient ma working infrastructure? (Nie → CORE first)"
      - "Czy AI to 'nice to have' czy 'compliance blocker'? (Blocker → AI)"
      - "Czy potrzebują devs czy consulting? (Devs → CORE)"
      - "Czy mówią o 'POC' czy 'production'? (POC → AI assessment)"
      - "Czy AI wymaga CORE infrastructure? (Tak → CORE+AI bundle)"

triggers:
  - "Nowa usługa (np. 'Rust team extension' lub 'Agentic RAG')"
  - "Wejście na nowy rynek (np. 'Szwajcaria' lub 'Healthtech')"
  - "Zmiana pricing (inflacja, konkurencja)"
  - "Feedback od sales że oferta 'nie trafia'"
  - "Klient pyta o AI ale ma core problem z systemem (lub odwrotnie)"

handoff_to_funnel:
  recipient: "Elena (Funnel Architect)"
  format: |
    FROM: Marcus (Offer Architect)
    TO: Elena (Funnel Architect)
    PROJECT: [Nazwa]
    TYPE: [CORE / AI / CORE+AI]
    
    OFERTA:
    - Value prop: [link]
    - Pricing: [Good/Better/Best]
    - Beachhead: [segment]
    - Assumptive metrics: [ile leadów, jaka konwersja]
    
    PYTANIA DO WALIDACJI W LEJKU:
    - [Pytanie 1 - Mom Test style]
    - [Pytanie 2 - Mom Test style]
    
    CORE/AI ANALYSIS:
    - Core component: [tak/nie, co]
    - AI component: [tak/nie, co]
    - Czy klient wie że AI wymaga CORE infrastructure? [tak/nie]
    
    NEXT STEPS:
    - Elena buduje funnel dla tej oferty
    - Testować [konkretne assumptive metrics]
