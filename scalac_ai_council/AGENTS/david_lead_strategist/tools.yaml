# David - Lead Strategist Tools
# Frameworks i templates z książek

---

frameworks:

  # 1. Account-Based Marketing - Sangram Vajre
  abm_tiers:
    name: "ABM Tier Strategy"
    description: "1-to-1, 1-to-few, 1-to-many approach"
    
    one_to_one:
      criteria: "Strategic accounts (5-10) - high value, strategic fit"
      tactics:
        - "Personalized video from CEO"
        - "Custom research reports"
        - "Executive-to-executive outreach"
        - "Custom events/dinners"
        - "Direct mail (gifts, books)"
      investment: "High touch, high cost, high expected return"
    
    one_to_few:
      criteria: "Segment accounts (20-50) - similar characteristics"
      tactics:
        - "Segment-specific content"
        - "Industry webinars"
        - "Personalized LinkedIn campaigns"
        - "Targeted advertising"
      investment: "Medium touch, scalable personalization"
    
    one_to_many:
      criteria: "Broad ICP (100-500) - fit persona"
      tactics:
        - "Automated email sequences"
        - "Content marketing"
        - "General LinkedIn outreach"
        - "PPC campaigns"
      investment: "Low touch, high volume"

  flip_funnel:
    name: "Flip the Funnel"
    description: "Identify → Expand → Engage → Advocate"
    stages:
      identify:
        - "Define ICP criteria"
        - "Build target account list"
        - "Score and tier accounts"
      expand:
        - "Map accounts (org structure)"
        - "Identify buying committee"
        - "Multi-thread contacts"
      engage:
        - "Personalized outreach"
        - "Content tailored to roles"
        - "Omni-channel approach"
      advocate:
        - "Customer success"
        - "Case studies"
        - "Referrals and expansion"

  # 2. The ABM Playbook - Andrew Mahr
  account_selection:
    name: "Account Selection Scorecard"
    criteria:
      revenue_potential: 
        weight: 40
        questions:
          - "Deal size potential?"
          - "Expansion opportunity?"
          - "Multi-year potential?"
      
      strategic_fit:
        weight: 30
        questions:
          - "Aligns with our expertise?"
          - "Reference potential?"
          - "Market presence?"
      
      likelihood_to_close:
        weight: 30
        questions:
          - "Known need/timing?"
          - "Budget availability?"
          - "Previous engagement?"

  ninety_day_playbook:
    name: "90-Day ABM Playbook"
    phases:
      days_1_30:
        name: "Research & Setup"
        activities:
          - "Deep account research"
          - "Identify buying committee"
          - "Map tech stack and triggers"
          - "Create account plan"
          - "Develop personalized assets"
      
      days_31_60:
        name: "Engagement"
        activities:
          - "Launch multi-thread outreach"
          - "Executive connection"
          - "Value-based content sharing"
          - "Event invitation"
          - "Social selling"
      
      days_61_90:
        name: "Acceleration"
        activities:
          - "Discovery meetings"
          - "Custom demos/proposals"
          - "Business case development"
          - "Executive sponsorship"
          - "Close plan"

  # 3. No Forms, No Spam, No Cold Calls - Latané Conant
  intent_based_selling:
    name: "Intent-Based Selling Framework"
    intent_sources:
      first_party:
        - "Website behavior (pages visited, time spent)"
        - "Content engagement (downloads, webinars)"
        - "Email engagement (opens, clicks)"
        - "Product usage (if applicable)"
      
      third_party:
        - "Bombora (topic surges)"
        - "G2 (category research)"
        - "TechTarget (content consumption)"
        - "LinkedIn (job changes, posts)"
    
    signals:
      high_intent:
        - "Visited pricing page"
        - "Downloaded technical whitepaper"
        - "Multiple visits in 7 days"
        - "Job posting for relevant role"
      
      medium_intent:
        - "Read blog posts"
        - "LinkedIn engagement"
        - "Newsletter subscription"
      
      trigger_events:
        - "Funding announcement"
        - "New CTO/VP Eng hired"
        - "Expansion to new market"
        - "Compliance regulation change"

  warm_outreach:
    name: "Warm Outreach Messaging"
    template: |
      Subject: [Personalized reference to intent signal]
      
      [Name],
      
      [Context - why reaching out now]:
      "Widziałem że [intent signal - np. 'szukaliście informacji o Sovereign AI' / 'dostaliście funding Series B']"
      
      [Relevance - why it matters]:
      "Wiele [fintech/banków] w podobnej sytuacji mierzy się z [problem]"
      
      [Value - what we offer]:
      "Pomogliśmy [podobna firma] [rezultat]"
      
      [CTA - low friction]:
      "Warto porozmawiać? Mam kilka insightów do podzielenia się."
      
      [Signature]

  # 4. LinkedIn Content Strategy - Mina Seetharaman
  thought_leadership:
    name: "Thought Leadership Program"
    components:
      executive_voice:
        - "Tomek jako Chief Architect"
        - "Monthly deep-dive posts"
        - "Technical commentary on trends"
      
      employee_advocacy:
        - "Devs sharing technical content"
        - "Behind the scenes"
        - "Culture and hiring"
      
      company_page:
        - "Case studies"
        - "Product updates"
        - "Industry insights"

  linkedin_tactics:
    name: "LinkedIn ABM Tactics"
    tactics:
      - "Thought Leader Ads: Boost Tomka's posts to target accounts"
      - "Conversation Ads: Direct messages at scale"
      - "Retargeting: Website visitors → LinkedIn ads"
      - "Contact targeting: Upload account lists"
      - "Social selling: Engage before outreach"

  # 5. The Ultimate Sales Machine - Chet Holmes
  dream_100:
    name: "Dream 100 Program"
    description: "Focus 80% effort on top 100 accounts"
    process:
      selection:
        - "Define perfect customer criteria"
        - "List top 100 prospects"
        - "Categorize by priority (A/B/C)"
      
      penetration:
        - "12-touch sequence over 12 months"
        - "Multiple channels (email, phone, mail, events)"
        - "Consistent, valuable contact"
      
      execution:
        - "Weekly review of Dream 100 activity"
        - "Update status and next actions"
        - "Celebrate wins, analyze losses"

  education_based:
    name: "Education-Based Marketing"
    assets:
      - "Webinar: 'How to Scale Without Breaking'"
      - "Guide: 'The Complete Scala Hiring Playbook'"
      - "Assessment: 'AI Readiness Scorecard'"
      - "Workshop: 'Architecture Review Best Practices'"
    
    positioning:
      - "Teach, don't sell"
      - "Position as expert"
      - "Build trust before pitch"

  twelve_touch:
    name: "12-Touch Sequence"
    touches:
      1: "LinkedIn connection (personalized)"
      2: "Email #1 - Value/resource"
      3: "LinkedIn engagement (comment/post)"
      4: "Email #2 - Case study"
      5: "Direct mail (book/guide)"
      6: "Phone call"
      7: "LinkedIn voice note"
      8: "Email #3 - Invitation (webinar/event)"
      9: "Video message (Loom)"
      10: "LinkedIn content share"
      11: "Email #4 - Final value"
      12: "Break-up email + phone"

  # 6. Fanatical Prospecting - Jeb Blount
  prospecting_discipline:
    name: "Daily Prospecting Discipline"
    daily_targets:
      sdr:
        contacts: 20
        mix:
          - "LinkedIn: 8"
          - "Email: 8"
          - "Phone: 4"
      
      ae:
        contacts: 10
        mix:
          - "LinkedIn: 4"
          - "Email: 4"
          - "Phone: 2"
    
    golden_hours: "8:00-11:00 AM - dedicated prospecting time"

  objection_handling:
    name: "Objection Response Framework"
    common_objections:
      we_have_vendor:
        response: "Rozumiem. Ciekawe - co się dzieje gdy [obecny vendor] nie może skalować się z Wami?"
        follow_up: "Warto mieć plan B. Mogę pokazać jak wygląda współpraca z nami jako backup?"
      
      no_budget:
        response: "Rozumiem. Jeśli mogę zapytać - ile kosztuje Was obecnie [problem]?"
        follow_up: "Czy to może być priorytet w kolejnym quarter?"
      
      not_priority:
        response: "Rozumiem. Co jest teraz najwyższym priorytetem?"
        follow_up: "Kiedy [obecny priorytet] będzie gotowy?"
      
      send_info:
        response: "Oczywiście. Żeby wysłać najbardziej relevantne info - mogę zapytać [kluczowe pytanie]?"
        follow_up: "Czy możemy umówić 15-min call za tydzień żeby omówić?"

  # 7. Sales Engagement - Mursalitza et al.
  omni_channel_cadence:
    name: "Omni-Channel Cadence Builder"
    template: |
      ## Cadence: [Name] | Target: [Persona] | Goal: [Meeting]
      
      | Day | Channel | Action | Content |
      |-----|---------|--------|---------|
      | 1 | LinkedIn | Connection + note | [Personalized research] |
      | 2 | Email | Value email | [Resource/industry insight] |
      | 4 | LinkedIn | Engage on post | [Comment] |
      | 6 | Email | Case study | [Relevant example] |
      | 8 | Phone | Call | [Voicemail script if no answer] |
      | 10 | LinkedIn | Voice note | [20s personalized] |
      | 12 | Email | Video | [Loom, 60s] |
      | 15 | Phone | Call | [Direct] |
      | 18 | Email | Break-up | [Polite close] |
      
      ### If engaged:
      - Open email + click → Call within 5 min
      - LinkedIn accept → Message within 24h
      - Phone answer → Discovery script

  signal_based_play:
    name: "Signal-Based Selling Play"
    triggers:
      high_value:
        - "Intent data surge (sovereign ai, scala hiring)"
        - "Multiple page visits (pricing, case studies)"
        - "Job posting for scala/ai roles"
        action: "Immediate personalized outreach"
      
      medium_value:
        - "Content download"
        - "Webinar attendance"
        - "Newsletter open/click"
        action: "Add to nurture sequence"
      
      trigger_event:
        - "Funding announcement"
        - "New executive hire"
        - "Compliance news"
        action: "Timely, relevant outreach"

  multi_threading:
    name: "Multi-Threading Map"
    template: |
      ## Account: [Name] | Target: [Persona]
      
      ### Buying Committee:
      | Role | Name | Status | Last Contact | Next Action |
      |------|------|--------|--------------|-------------|
      | Economic Buyer | [Name] | [Not contacted/Engaged/Champion] | [Date] | [Action] |
      | Technical Evaluator | [Name] | [Status] | [Date] | [Action] |
      | User/Beneficiary | [Name] | [Status] | [Date] | [Action] |
      | Blocker | [Name] | [Status] | [Date] | [Action] |
      
      ### Strategy:
      - Primary target: [Who to focus on]
      - Champion building: [Who can promote us]
      - Blocker mitigation: [How to handle resistance]

---

templates:

  account_plan:
    name: "Account Plan Template"
    sections:
      - "Account Overview: Industry, size, tech stack"
      - "Business Priorities: What they care about"
      - "Our Value Proposition: Why us"
      - "Buying Committee: Contacts and roles"
      - "Engagement History: Past interactions"
      - "Competitive Landscape: Who else"
      - "Engagement Strategy: Approach"
      - "Goals and Metrics: Success criteria"

  outreach_sequence:
    name: "Sequence Performance Tracker"
    fields:
      - "Sequence name"
      - "Target persona"
      - "Number of touches"
      - "Response rate"
      - "Meeting rate"
      - "Pipeline generated"
      - "A/B tests running"

---

metrics:
  
  lead_gen_kpis:
    - metric: "Meetings booked"
      target: "20/month"
      by_channel:
        - "Outbound: 12"
        - "Inbound: 5"
        - "Referrals: 3"
    
    - metric: "Pipeline generated"
      target: "500k PLN/month"
      core: "400k PLN"
      ai: "100k PLN"
    
    - metric: "Response rate"
      target: 
        email: ">15%"
        linkedin: ">25%"
    
    - metric: "Dream 100 penetration"
      target: "50% engaged within 90 days"
    
    - metric: "CAC by channel"
      target: "Track and optimize"

---

workflows:

  weekly_prospecting:
    name: "Weekly Prospecting Ritual"
    monday:
      - "Review last week results"
      - "Plan this week targets"
      - "Update account plans"
    
    daily:
      - "Golden Hours: 8-11 AM prospecting"
      - "Research next day's contacts"
      - "Log activities in CRM"
    
    friday:
      - "Review week metrics"
      - "Celebrate wins"
      - "Plan next week"

  abm_campaign_launch:
    name: "ABM Campaign Launch Process"
    steps:
      - "1. Define ICP and select accounts"
      - "2. Research and tier accounts"
      - "3. Map buying committees"
      - "4. Create account plans"
      - "5. Develop personalized content"
      - "6. Build sequences and plays"
      - "7. Launch and monitor"
      - "8. Weekly optimization"
