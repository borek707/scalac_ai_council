name: CI

on:
  push:
    branches: [main, refactor/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Black (check formatting)
        run: uv run black --check .

      - name: Run Ruff (linting)
        run: uv run ruff check .

      - name: Run mypy (strict type check)
        run: uv run mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=council \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            tests/

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Verify python -m council --help (exit code 0)
        run: uv run python -m council --help

      - name: Verify council --help (exit code 0)
        run: uv run council --help

      - name: Run demo mode (saas-launch, 1 round, no API keys)
        run: uv run python -m council --demo --scenario saas-launch --rounds 1

      - name: Run E2E integration tests (demo + review + CLI)
        run: uv run pytest tests/test_e2e.py -m integration -q

      - name: Run monitor mode (no config needed)
        run: uv run python -m council --monitor --output /tmp/test-monitor

  build:
    name: Package Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build package
        run: uv build

      - name: Install built wheel into a clean venv
        run: |
          python -m venv /tmp/council-wheel-venv
          /tmp/council-wheel-venv/bin/pip install dist/*.whl

      - name: Verify council --help from installed wheel
        run: /tmp/council-wheel-venv/bin/council --help

      - name: Verify package is importable (agent templates included)
        run: /tmp/council-wheel-venv/bin/python -c "import council; print('ok')"
