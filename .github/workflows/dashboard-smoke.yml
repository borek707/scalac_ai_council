name: Dashboard smoke

on:
  workflow_dispatch:
  schedule:
    # Weekly — optional, non-blocking observability check
    - cron: "0 6 * * 1"

jobs:
  dashboard-tests:
    name: Dashboard tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run dashboard unit + Textual tests
        run: |
          uv run pytest \
            tests/test_dashboard.py \
            tests/test_dashboard_textual.py \
            -q

      - name: Run dashboard CLI regression tests
        run: |
          uv run pytest \
            tests/test_cli.py::TestWorkspaceOverwrite::test_dashboard_mode_skips_tty_input \
            tests/test_cli.py::TestWorkspaceOverwrite::test_non_dashboard_tty_still_prompts_on_overwrite \
            tests/test_cli.py::TestWorkspaceOverwrite::test_force_dashboard_logs_continue \
            tests/test_cli.py::TestDashboardStartupLogs \
            -q

      - name: Run demo + dashboard callback integration
        run: uv run pytest tests/test_dashboard_textual.py::TestDemoDashboardIntegration -m integration -q
